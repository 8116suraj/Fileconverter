<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileConverter</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<style>
body {
  font-family: Arial;
  background: #0a0a0f;
  color: white;
  text-align: center;
  padding: 30px 15px;
}

/* CONTAINER */
.container {
  max-width: 400px;
  margin: auto;
}

/* DROP ZONE */
.drop-zone {
  border: 2px dashed #555;
  padding: 30px 20px;
  margin: 20px auto;
  width: 100%;
  max-width: 300px;
  cursor: pointer;
  text-align: center;
  border-radius: 12px;
}

/* BUTTON */
button {
  padding: 12px;
  margin-top: 20px;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
}

/* SELECT */
select {
  padding: 10px;
  margin-top: 15px;
  width: 100%;
  border-radius: 8px;
}

/* FILE LIST */
.file-item {
  margin-top: 10px;
  font-size: 14px;
  text-align: left;
}

/* PROGRESS BAR */
#progressContainer {
  display: none;
  margin-top: 20px;
}

.progress-bg {
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 10px;
  width: 0%;
  background: #4caf50;
  transition: width 0.3s;
}

#progressText {
  font-size: 12px;
  margin-top: 5px;
}

/* MOBILE */
@media (max-width: 480px) {
  h1 {
    font-size: 22px;
  }

  .drop-zone {
    padding: 25px 10px;
  }
}

.footer-link {
  color: #aaa;
  text-decoration: none;
  transition: 0.2s;
}

.footer-link:hover {
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>File Converter</h1>

<h5>All your image conversions in one tool — simple, fast, free.</h5>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
  Tap or Drop Files
  <input type="file" id="fileInput" multiple style="display:none">
</div>

<div id="fileList"></div>

<select id="toFormat">
  <option value="jpg">Convert to JPG</option>
  <option value="png">Convert to PNG</option>
  <option value="webp">Convert to WEBP</option>
  <option value="pdf">Convert to PDF</option>
</select>

<button onclick="startConversion()">Convert</button>

<!-- PROGRESS BAR -->
<div id="progressContainer">
  <div class="progress-bg">
    <div id="progressBar"></div>
  </div>
  <p id="progressText">0%</p>
</div>

</div>

<script>
let files = [];

document.getElementById("fileInput").addEventListener("change", function(e) {
  files = [];
  for (let file of e.target.files) {
    files.push({ file, name: file.name });
  }
  renderFiles();
});

function renderFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerText = f.name;
    list.appendChild(div);
  });
}

async function startConversion() {
  if (files.length === 0) {
    alert("⚠ Please add a file");
    return;
  }

  const progressContainer = document.getElementById("progressContainer");
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");

  progressContainer.style.display = "block";

  let progress = 0;

  const interval = setInterval(() => {
    if (progress < 90) {
      progress += Math.random() * 10;
      progressBar.style.width = progress + "%";
      progressText.innerText = Math.floor(progress) + "%";
    }
  }, 500);

  const format = document.getElementById('toFormat').value;
  const formData = new FormData();

  files.forEach(f => {
    formData.append('file', f.file);
  });

  formData.append('format', format);

  try {
    const response = await fetch('https://fileconvert-backend-7epe.onrender.com/convert', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error("Server error");
    }

    const blob = await response.blob();

    clearInterval(interval);
    progressBar.style.width = "100%";
    progressText.innerText = "100%";

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;

    a.download = format === 'pdf'
      ? 'converted.pdf'
      : 'converted.' + format;

    a.click();

    setTimeout(() => {
      alert("✅ Download started");
      progressContainer.style.display = "none";
      progressBar.style.width = "0%";
      progressText.innerText = "0%";
    }, 500);

  } catch (err) {
    clearInterval(interval);
    console.error(err);
    alert("❌ Conversion failed");
    progressContainer.style.display = "none";
  }
}
</script>

  margin-top: 350px;
  padding: 20px;
  border-top: 1px solid #333;
  font-size: 14px;
  color: #aaa;
">

<a href="security.html" class="footer-link">Security</a>
<a href="contact.html" class="footer-link">Contact</a>
  </div>

</footer>

</body>
</html>
