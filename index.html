<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileConverter</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0f;
  color: white;
  text-align: center;
  padding: 30px 15px;

  
}

/* CONTAINER */
.container {
  max-width: 400px;
  margin: auto;
}

/* DROP ZONE */
.drop-zone {
  border: 2px dashed #555;
  padding: 30px 20px;
  margin: 20px auto;
  width: 100%;
  max-width: 300px;
  cursor: pointer;
  text-align: center;
  border-radius: 12px;
}

/* BUTTON */
button {
  padding: 12px;
  margin-top: 20px;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
}

/* SELECT */
select {
  padding: 10px;
  margin-top: 15px;
  width: 100%;
  border-radius: 8px;
}

/* FILE LIST */
.file-item {
  margin-top: 10px;
  font-size: 14px;
  text-align: left;
}

/* MOBILE IMPROVEMENT */
@media (max-width: 480px) {
  h1 {
    font-size: 22px;
  }

  .drop-zone {
    padding: 25px 10px;
  }
}

.footer-link {
  color: #aaa;
  text-decoration: none;
  transition: 0.2s;
}

.footer-link:hover {
  color: white;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 FileConverter</h1>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
  Tap or Drop Files
  <input type="file" id="fileInput" multiple style="display:none">
</div>

<div id="fileList"></div>

<select id="toFormat">
  <option value="jpg">Convert to JPG</option>
  <option value="png">Convert to PNG</option>
  <option value="webp">Convert to WEBP</option>
  <option value="pdf">Convert to PDF (JPG only)</option>
</select>

<button onclick="startConversion()">Convert</button>

</div>

<script>
let files = [];

document.getElementById("fileInput").addEventListener("change", function(e) {
  files = [];
  for (let file of e.target.files) {
    files.push({ file, name: file.name });
  }
  renderFiles();
});

function renderFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerText = f.name;
    list.appendChild(div);
  });
}

async function startConversion() {
  if (files.length === 0) {
    alert("⚠ Please add a file");
    return;
  }

  const format = document.getElementById('toFormat').value;
  const formData = new FormData();

  files.forEach(f => {
    formData.append('file', f.file);
  });

  formData.append('format', format);

  try {
    alert("⏳ Converting... Please click 'OK'");

    const response = await fetch('https://fileconvert-backend-7epe.onrender.com/convert', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error("Server error");
    }

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;

    a.download = format === 'pdf'
      ? 'converted.pdf'
      : 'converted.' + format;

    a.click();

    alert("✅ Download started");

  } catch (err) {
    console.error(err);
    alert("❌ Conversion failed");
  }
}
</script>


<footer style="
  margin-top: 350px;
  padding: 20px;
  border-top: 1px solid #333;
  font-size: 14px;
  color: #aaa;
">

  <div style="margin-bottom: 10px;">

<a href="about.html" class="footer-link">About Us</a>

<a href="security.html" class="footer-link">Security</a>
<a href="contact.html" class="footer-link">Contact</a>
  </div>

</footer>

</body>
</html>
