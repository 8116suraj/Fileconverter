<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileConverter</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" href="/favicon.png">

<!-- Vercel Analytics -->
<script defer src="/_vercel/insights/script.js"></script>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0a0f, #131b2e);
  color: white;
  text-align: center;
  padding: 30px 15px;

  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.3);
  padding: 20px;
  border-radius: 20px;
}

/* TITLE */
.title {
  font-size: 40px;
  font-weight: 700;
}

.subtitle {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 20px;
}

/* DROP ZONE */
.drop-zone {
  box-sizing: border-box;
  border: 2px dashed #444;
  padding: 35px 20px;
  margin: 20px auto;
  width: 100%;
  max-width: 320px;
  cursor: pointer;
  text-align: center;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  transition: 0.3s;
}

.drop-zone:hover {
  border-color: #4caf50;
  background: rgba(76,175,80,0.08);
}

/* BUTTON */
button {
  padding: 14px;
  margin-top: 20px;
  cursor: pointer;
  width: 100%;
  max-width: 320px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white;
  font-weight: 600;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

/* SELECT */
select {
  padding: 12px;
  margin-top: 15px;
  width: 100%;
  border-radius: 10px;
  background: #1a1a25;
  color: white;
  border: 1px solid #333;
}

/* FILE LIST */
.file-item {
  margin-top: 10px;
  font-size: 13px;
  text-align: left;
  background: rgba(255,255,255,0.05);
  padding: 8px;
  border-radius: 8px;
}

/* PROGRESS BAR */
#progressContainer {
  display: none;
  margin-top: 20px;
}

.progress-bg {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #4caf50, #81c784);
  transition: width 0.3s;
}

#progressText {
  font-size: 12px;
  margin-top: 5px;
  color: #aaa;
}

/* FOOTER */
footer {
  margin-top: 120px;
  padding: 20px;
  border-top: 1px solid #333;
  font-size: 14px;
  color: #aaa;
}

.footer-link {
  color: #aaa;
  text-decoration: none;
  transition: 0.2s;
}

.footer-link:hover {
  color: #4caf50;
}

/* MOBILE */
@media (max-width: 480px) {
  .title {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="title">File Converter</div>
<div class="subtitle">Convert images instantly — fast, clean, and free.</div>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
  Tap or Drop Files 📂
  <input type="file" id="fileInput" multiple style="display:none">
</div>

<div id="fileList"></div>

<select id="toFormat">
  <option value="jpg">Convert to JPG</option>
  <option value="png">Convert to PNG</option>
  <option value="webp">Convert to WEBP</option>
  <option value="pdf">Convert to PDF</option>
</select>

<button onclick="startConversion()">Convert Now</button>

<!-- PROGRESS BAR -->
<div id="progressContainer">
  <div class="progress-bg">
    <div id="progressBar"></div>
  </div>
  <p id="progressText">0%</p>
</div>

</div>

<script>
let files = [];

document.getElementById("fileInput").addEventListener("change", function(e) {
  files = [];
  for (let file of e.target.files) {
    files.push({ file, name: file.name });
  }
  renderFiles();
});

function renderFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerText = f.name;
    list.appendChild(div);
  });
}

async function startConversion() {
  if (files.length === 0) {
    alert("⚠ Please add a file");
    return;
  }

  const progressContainer = document.getElementById("progressContainer");
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");

  progressContainer.style.display = "block";

  let progress = 0;

  const interval = setInterval(() => {
    if (progress < 90) {
      progress += Math.random() * 10;
      progressBar.style.width = progress + "%";
      progressText.innerText = Math.floor(progress) + "%";
    }
  }, 500);

  const format = document.getElementById('toFormat').value;
  const formData = new FormData();

  files.forEach(f => {
    formData.append('file', f.file);
  });

  formData.append('format', format);

  try {
    const response = await fetch('https://fileconvert-backend-7epe.onrender.com/convert', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error("Server error");
    }

    const blob = await response.blob();

    clearInterval(interval);
    progressBar.style.width = "100%";
    progressText.innerText = "100%";

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;

    a.download = format === 'pdf'
      ? 'converted.pdf'
      : 'converted.' + format;

    a.click();

    setTimeout(() => {
      alert("✅ Download started");
      progressContainer.style.display = "none";
      progressBar.style.width = "0%";
      progressText.innerText = "0%";
    }, 500);

  } catch (err) {
    clearInterval(interval);
    console.error(err);
    alert("❌ Conversion failed");
    progressContainer.style.display = "none";
  }
}

/* DRAG & DROP EFFECT */
const dropZone = document.querySelector(".drop-zone");

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.style.borderColor = "#4caf50";
});

dropZone.addEventListener("dragleave", e => {
  dropZone.style.borderColor = "#444";
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.style.borderColor = "#444";
  document.getElementById("fileInput").files = e.dataTransfer.files;
  document.getElementById("fileInput").dispatchEvent(new Event("change"));
});
</script>

<footer>
  <div style="margin-bottom: 10px;">
    © 2026 FileConverter
  </div>

  <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;">
    <a href="about.html" class="footer-link">About Us</a>
    <a href="donate.html" class="footer-link">Donate</a>
    <a href="privacy.html" class="footer-link">Privacy</a>
    <a href="terms.html" class="footer-link">Terms</a>
    <a href="security.html" class="footer-link">Security</a>
    <a href="contact.html" class="footer-link">Contact</a>
  </div>
</footer>

</body>
</html>
